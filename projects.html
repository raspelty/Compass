<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Games | Quizlet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        /* Dark Mode (Default) */
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #0f0f0f;
            --card-bg: #1a1a2e;
            --card-hover: #16213e;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #2d3748;
            --search-bg: #1a1a2e;
        }

        /* Light Mode */
        body.light {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --card-bg: #ffffff;
            --card-hover: #e0f2fe;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #e2e8f0;
            --search-bg: #ffffff;
        }

        body {
            background-color: var(--bg-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header Bar */
        .header {
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Back Button (X) */
        .back-btn {
            background: var(--accent);
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .back-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        /* Casino Button */
        .casino-btn {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a1a2e;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .casino-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            background: var(--card-hover);
        }

        /* Search Bar */
        .search-wrapper {
            flex: 1;
            max-width: 320px;
            min-width: 180px;
        }

        .search-input {
            width: 100%;
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--search-bg);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        /* Game Count */
        .game-count {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        /* Game Grid */
        .games-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Game Card */
        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .game-card:hover {
            transform: translateY(-3px);
            background: var(--card-hover);
            border-color: var(--accent);
        }

        /* Game Icon - Much Smaller! */
        .game-icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            background: var(--bg-secondary);
        }

        /* Fallback for missing images */
        .game-icon[src=""],
        .game-icon:not([src]),
        .game-icon.error {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        /* Game Title - Smaller! */
        .game-title {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.3;
            word-break: break-word;
            max-width: 100%;
        }

        /* Loading Spinner */
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 14px;
            grid-column: 1 / -1;
        }

        /* Back to Top Button */
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            z-index: 999;
        }

        .back-to-top:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .header {
                padding: 10px 15px;
            }
            
            .games-container {
                grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
                gap: 8px;
                padding: 12px;
            }
            
            .game-icon {
                width: 40px;
                height: 40px;
            }
            
            .game-title {
                font-size: 9px;
            }
            
            .game-count {
                font-size: 11px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="/Compass/index.html" class="back-btn" title="Back to Home">✕</a>
            <h1>🎮 Games</h1>
            <a href="/Compass/casino.html" class="casino-btn" title="Casino Games">🎰 Casino</a>
            <a href="https://raspelty.github.io/GUST/" class="casino-btn" style="background: linear-gradient(135deg, #3b82f6, #2563eb);" title="Unblocker Proxy">🌐 Unblocker</a>
        </div>
        <button class="theme-toggle" id="themeToggle">🌙 Dark</button>
        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="Search games..." autocomplete="off">
        </div>
        <div class="game-count" id="gameCount"></div>
    </div>

    <div id="loader" class="loader">
        <div class="spinner"></div>
    </div>

    <div id="gamesContainer" class="games-container"></div>

    <button id="backToTop" class="back-to-top" title="Back to top">↑</button>

    <script>
        let gamesData = [];

        // Theme handling
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light');
                document.getElementById('themeToggle').innerHTML = '☀️ Light';
            } else {
                document.body.classList.remove('light');
                document.getElementById('themeToggle').innerHTML = '🌙 Dark';
            }
        }

        function toggleTheme() {
            if (document.body.classList.contains('light')) {
                document.body.classList.remove('light');
                localStorage.setItem('theme', 'dark');
                document.getElementById('themeToggle').innerHTML = '🌙 Dark';
            } else {
                document.body.classList.add('light');
                localStorage.setItem('theme', 'light');
                document.getElementById('themeToggle').innerHTML = '☀️ Light';
            }
        }

        // Helper for images with fallback
        function getGameIcon(game) {
            if (game.imgSrc && game.imgSrc !== "" && !game.imgSrc.includes('undefined')) {
                return game.imgSrc;
            }
            return "";
        }

        // Render games
        function renderGames(games) {
            const container = document.getElementById('gamesContainer');
            const gameCount = document.getElementById('gameCount');
            
            if (!games || games.length === 0) {
                container.innerHTML = '<div class="no-results">😔 No games found. Try a different search!</div>';
                gameCount.textContent = '0 games';
                return;
            }
            
            gameCount.textContent = `${games.length} game${games.length !== 1 ? 's' : ''}`;
            
            container.innerHTML = games.map(game => {
                const imgSrc = getGameIcon(game);
                return `
                    <a href="${game.link}" class="game-card">
                        <img class="game-icon" src="${imgSrc}" alt="${game.title}" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<div class=\\'game-icon\\' style=\\'background: linear-gradient(135deg, var(--accent), var(--accent-hover)); display: flex; align-items: center; justify-content: center;\\'>🎮</div>'); this.remove()">
                        <span class="game-title">${escapeHtml(game.title)}</span>
                    </a>
                `;
            }).join('');
        }

        // Simple escape to prevent XSS
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Search functionality with debounce
        let searchTimeout;
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function(e) {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const query = e.target.value.toLowerCase().trim();
                    if (query === '') {
                        renderGames(gamesData);
                    } else {
                        const filtered = gamesData.filter(game => 
                            game.title.toLowerCase().includes(query)
                        );
                        renderGames(filtered);
                    }
                }, 200);
            });
        }

        // Back to top button
        function setupBackToTop() {
            const btn = document.getElementById('backToTop');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 300) {
                    btn.style.display = 'flex';
                } else {
                    btn.style.display = 'none';
                }
            });
            btn.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
            btn.style.display = 'none';
        }

        // Load games from JSON
        async function loadGames() {
            try {
                const response = await fetch('config/games.json');
                gamesData = await response.json();
                document.getElementById('loader').style.display = 'none';
                renderGames(gamesData);
                setupSearch();
            } catch (error) {
                console.error('Error loading games:', error);
                document.getElementById('loader').innerHTML = '<div class="no-results">❌ Failed to load games. Please refresh the page.</div>';
            }
        }

        // Initialize everything
        initTheme();
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        setupBackToTop();
        loadGames();
    </script>
</body>
</html>
