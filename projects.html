<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Games | RASPELT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        :root {
            --bg-primary: #151517;
            --bg-secondary: #1b1b1c;
            --card-bg: #1a1a2e;
            --card-hover: #16213e;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --accent: #5686fe;
            --accent-hover: #3b6ef0;
            --border: #2d3748;
            --search-bg: #1a1a2e;
            --featured-bg: #1b1b1c;
        }

        body.light {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --card-bg: #ffffff;
            --card-hover: #e0f2fe;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #5686fe;
            --accent-hover: #3b6ef0;
            --border: #e2e8f0;
            --search-bg: #ffffff;
            --featured-bg: #ffffff;
        }

        body {
            background-color: var(--bg-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header Bar */
        .header {
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .back-btn {
            background: var(--accent);
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .back-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
        
        /* Flat color buttons - no gradient */
        .casino-btn, .unblocker-btn {
            background: #5686fe;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
        }
        .casino-btn:hover, .unblocker-btn:hover {
            background: #3b6ef0;
            transform: scale(1.05);
        }
        
        h1 { font-size: 1.3rem; font-weight: 600; }
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .theme-toggle:hover { background: var(--card-hover); }
        .search-wrapper { flex: 1; max-width: 320px; min-width: 180px; }
        .search-input {
            width: 100%;
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--search-bg);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(86, 134, 254, 0.2); }
        .game-count { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }

        /* Featured Section */
        .featured-section {
            padding: 20px 20px 0 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .featured-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .featured-title span { background: var(--accent); padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; }
        .featured-scroll {
            overflow-x: auto;
            scroll-behavior: smooth;
            white-space: nowrap;
            padding-bottom: 15px;
            -webkit-overflow-scrolling: touch;
        }
        .featured-scroll::-webkit-scrollbar { height: 5px; }
        .featured-scroll::-webkit-scrollbar-track { background: var(--border); border-radius: 5px; }
        .featured-scroll::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 5px; }
        .featured-track {
            display: inline-flex;
            gap: 20px;
        }
        .featured-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            width: 130px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
        }
        .featured-card:hover { transform: translateY(-5px); background: var(--card-hover); border-color: var(--accent); }
        .featured-icon {
            width: 70px;
            height: 70px;
            border-radius: 14px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }
        .featured-title-text {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: normal;
            word-break: break-word;
            max-width: 110px;
        }

        /* Genre Filter Bar */
        .genre-bar {
            padding: 15px 20px;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
        }
        .genre-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 6px 18px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }
        .genre-btn:hover { background: var(--card-hover); color: var(--text-primary); }
        .genre-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Game Grid */
        .games-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .game-card:hover { transform: translateY(-3px); background: var(--card-hover); border-color: var(--accent); }
        .game-icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            background: var(--bg-secondary);
        }
        /* Flat color fallback - NO gradient */
        .game-icon[src=""], .game-icon:not([src]), .game-icon.error {
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }
        .game-title { font-size: 11px; font-weight: 500; color: var(--text-primary); line-height: 1.3; word-break: break-word; }
        .loader { display: flex; justify-content: center; align-items: center; min-height: 200px; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .no-results { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 14px; grid-column: 1 / -1; }
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 18px;
            border: none;
            cursor: pointer;
            z-index: 999;
        }
        .back-to-top:hover { background: var(--accent-hover); transform: scale(1.05); }
        @media (max-width: 600px) {
            .header { padding: 10px 15px; }
            .games-container { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 8px; padding: 12px; }
            .game-icon { width: 40px; height: 40px; }
            .game-title { font-size: 9px; }
            .game-count { font-size: 11px; }
            .featured-card { width: 100px; }
            .featured-icon { width: 55px; height: 55px; font-size: 26px; }
            .featured-title-text { font-size: 11px; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="/Compass/index.html" class="back-btn" title="Back to Home">✕</a>
            <h1>🎮</h1>
            <a href="/Compass/casino.html" class="casino-btn" title="Casino Games">🎰 Casino</a>
            <a href="https://raspelty.github.io/GUST/" class="unblocker-btn" title="Unblocker Proxy">🌐 Unblocker</a>
        </div>
        <button class="theme-toggle" id="themeToggle">🌙 Dark</button>
        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="Search games..." autocomplete="off">
        </div>
        <div class="game-count" id="gameCount"></div>
    </div>

    <!-- Genre Filter Bar -->
    <div class="genre-bar" id="genreBar">
        <button class="genre-btn active" data-genre="all">All</button>
        <button class="genre-btn" data-genre="action">⚡ Action</button>
        <button class="genre-btn" data-genre="arcade">🎮 Arcade</button>
        <button class="genre-btn" data-genre="classic">🕹️ Classic</button>
        <button class="genre-btn" data-genre="multiplayer">🌍 Multiplayer</button>
    </div>

    <!-- Featured Games Auto-Scroll -->
    <div class="featured-section">
        <div class="featured-title">🔥 Popular Now <span>auto-scrolling</span></div>
        <div class="featured-scroll" id="featuredScroll">
            <div class="featured-track" id="featuredTrack"></div>
        </div>
    </div>

    <div id="loader" class="loader"><div class="spinner"></div></div>
    <div id="gamesContainer" class="games-container"></div>
    <button id="backToTop" class="back-to-top" title="Back to top">↑</button>

    <script>
        let gamesData = [];
        let currentGenre = 'all';
        let currentSearchQuery = '';
        let autoScrollInterval = null;

        // Genre mapping based on game titles
        function getGameGenre(title) {
            const lowerTitle = title.toLowerCase();
            if (['slope', 'retro bowl', 'shell shockers', 'krunker', '1v1lol', 'getaway shootout', 'rooftop snipers', 'smash karts', 'paper.io 2'].includes(lowerTitle)) return 'multiplayer';
            if (['vex 3', 'vex 4', 'vex 5', 'vex 6', 'vex 7', 'n-gon', 'tunnel rush', 'run 3', 'motox3m'].includes(lowerTitle)) return 'action';
            if (['2048', 'cookie clicker', 'duck life', 'duck life 2', 'duck life 3', 'idle breakout', 'worlds hardest game'].includes(lowerTitle)) return 'classic';
            return 'arcade';
        }

        function filterGames() {
            let filtered = [...gamesData];
            if (currentSearchQuery) {
                filtered = filtered.filter(game => game.title.toLowerCase().includes(currentSearchQuery));
            }
            if (currentGenre !== 'all') {
                filtered = filtered.filter(game => getGameGenre(game.title) === currentGenre);
            }
            renderGames(filtered);
            updateFeaturedGames(filtered.slice(0, 10));
            return filtered;
        }

        function updateFeaturedGames(games) {
            const track = document.getElementById('featuredTrack');
            if (!track) return;
            const gamesToShow = games.slice(0, 8);
            track.innerHTML = gamesToShow.map(game => `
                <a href="${game.link}" class="featured-card">
                    <div class="featured-icon">🎮</div>
                    <span class="featured-title-text">${escapeHtml(game.title)}</span>
                </a>
            `).join('');
            
            if (autoScrollInterval) clearInterval(autoScrollInterval);
            const scrollDiv = document.getElementById('featuredScroll');
            let scrollAmount = 0;
            autoScrollInterval = setInterval(() => {
                if (scrollDiv && !scrollDiv.matches(':hover') && gamesToShow.length > 2) {
                    const scrollWidth = scrollDiv.scrollWidth - scrollDiv.clientWidth;
                    if (scrollWidth <= 0) return;
                    scrollAmount += 0.8;
                    if (scrollAmount >= scrollWidth) scrollAmount = 0;
                    scrollDiv.scrollTo({ left: scrollAmount, behavior: 'smooth' });
                }
            }, 100);
        }

        function renderGames(games) {
            const container = document.getElementById('gamesContainer');
            const gameCount = document.getElementById('gameCount');
            if (!games || games.length === 0) {
                container.innerHTML = '<div class="no-results">😔 No games found. Try a different search!</div>';
                gameCount.textContent = '0 games';
                return;
            }
            gameCount.textContent = `${games.length} game${games.length !== 1 ? 's' : ''}`;
            container.innerHTML = games.map(game => {
                const imgSrc = (game.imgSrc && game.imgSrc !== "" && !game.imgSrc.includes('undefined')) ? game.imgSrc : "";
                return `<a href="${game.link}" class="game-card">
                    <img class="game-icon" src="${imgSrc}" alt="${game.title}" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<div class=\\'game-icon\\' style=\\'background: var(--accent); display: flex; align-items: center; justify-content: center;\\'>🎮</div>'); this.remove()">
                    <span class="game-title">${escapeHtml(game.title)}</span>
                </a>`;
            }).join('');
        }

        function escapeHtml(str) { return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }

        // Theme handling
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light');
                document.getElementById('themeToggle').innerHTML = '☀️ Light';
            } else {
                document.body.classList.remove('light');
                document.getElementById('themeToggle').innerHTML = '🌙 Dark';
            }
        }
        function toggleTheme() {
            if (document.body.classList.contains('light')) {
                document.body.classList.remove('light');
                localStorage.setItem('theme', 'dark');
                document.getElementById('themeToggle').innerHTML = '🌙 Dark';
            } else {
                document.body.classList.add('light');
                localStorage.setItem('theme', 'light');
                document.getElementById('themeToggle').innerHTML = '☀️ Light';
            }
        }

        // Search
        let searchTimeout;
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function(e) {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    currentSearchQuery = e.target.value.toLowerCase().trim();
                    filterGames();
                }, 200);
            });
        }

        // Genre buttons
        function setupGenres() {
            document.querySelectorAll('.genre-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentGenre = btn.dataset.genre;
                    filterGames();
                });
            });
        }

        // Back to top
        function setupBackToTop() {
            const btn = document.getElementById('backToTop');
            window.addEventListener('scroll', () => { btn.style.display = window.scrollY > 300 ? 'flex' : 'none'; });
            btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
            btn.style.display = 'none';
        }

        // Load games
        async function loadGames() {
            try {
                const response = await fetch('config/games.json');
                gamesData = await response.json();
                document.getElementById('loader').style.display = 'none';
                filterGames();
                setupSearch();
            } catch (error) {
                console.error('Error loading games:', error);
                document.getElementById('loader').innerHTML = '<div class="no-results">❌ Failed to load games. Please refresh the page.</div>';
            }
        }

        initTheme();
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        setupBackToTop();
        setupGenres();
        loadGames();
    </script>
</body>
</html>
