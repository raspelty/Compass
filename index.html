<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RASPELT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #0f0f0f;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #2d3748;
        }

        body.light {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #e2e8f0;
        }

        body {
            background-color: var(--bg-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 4rem;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            margin: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-primary);
            z-index: 100;
        }

        /* Modal/Popup */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 1px solid var(--border);
        }

        .modal-content h2 {
            color: #ef4444;
            margin-bottom: 15px;
        }

        .modal-content code {
            background: var(--bg-primary);
            padding: 8px 12px;
            border-radius: 8px;
            display: inline-block;
            margin: 15px 0;
            font-family: monospace;
        }

        .close-modal {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 10px;
        }

        .close-modal:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌙 Dark</button>

    <div class="container">
        <h1>RASPELT</h1>
        <div class="subtitle">🎮 Games • 🌐 Unblocker</div>
        
        <div>
            <a href="https://kikimilonas.xyz/projects.html" class="btn btn-primary">🎮 Enter Games</a>
            <a href="#" id="unblockerBtn" class="btn btn-secondary">🌐 Open Unblocker</a>
        </div>
    </div>

    <!-- Popup Modal -->
    <div id="popupModal" class="modal">
        <div class="modal-content">
            <h2>⚠️ MUST READ ⚠️</h2>
            <p>Before using the unblocker:</p>
            <ol style="text-align: left; margin: 15px 0 15px 20px;">
                <li>Click the <strong>⚙️ Settings</strong> icon in the top right</li>
                <li>Find <strong>WISP Server</strong> or <strong>Backend URL</strong></li>
                <li>Make sure it says:</li>
            </ol>
            <code>wss://my-dirty-sam.onrender.com</code>
            <p style="margin-top: 10px;">If not, change it to that URL and click Save.</p>
            <button class="close-modal" onclick="closeModalAndProceed()">Got it! Continue →</button>
        </div>
    </div>

    <script>
        const modal = document.getElementById('popupModal');
        const unblockerBtn = document.getElementById('unblockerBtn');
        let pendingUrl = '';

        function closeModalAndProceed() {
            modal.style.display = 'none';
            if (pendingUrl) {
                window.open(pendingUrl, '_blank');
                pendingUrl = '';
            }
        }

        unblockerBtn.addEventListener('click', (e) => {
            e.preventDefault();
            pendingUrl = 'https://raspelty.github.io/GUST/';
            modal.style.display = 'flex';
        });

        // Close modal if clicking outside
        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
                pendingUrl = '';
            }
        });

        // Theme handling
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light');
                document.getElementById('themeToggle').innerHTML = '☀️ Light';
            } else {
                document.body.classList.remove('light');
                document.getElementById('themeToggle').innerHTML = '🌙 Dark';
            }
        }

        function toggleTheme() {
            if (document.body.classList.contains('light')) {
                document.body.classList.remove('light');
                localStorage.setItem('theme', 'dark');
                document.getElementById('themeToggle').innerHTML = '🌙 Dark';
            } else {
                document.body.classList.add('light');
                localStorage.setItem('theme', 'light');
                document.getElementById('themeToggle').innerHTML = '☀️ Light';
            }
        }

        initTheme();
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    </script>
</body>
</html>
